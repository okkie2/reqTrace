- term: requirement
  definition: A statement that must be satisfied.
  example: "The patient must be uniquely and securely identified at national level."
  explanation: |
    Statement_type.
    A requirement can come directly from a source or be derived from it, but that distinction is captured through relations and source references, not through a separate type.
  allowed_synonym:
    - obligation
  forbidden_or_avoid_synonyms:
    - wish
    - idea
  source: "Internal model and ISO/IEC/IEEE 29148"
  category: "Statement type"

- term: interpretation
  definition: An explanation of what a requirement or source means in context.
  example: "By demographic data we mean BSN and date of birth in the ISM for UC-A."
  explanation: |
    Statement_type.
    Use interpretation when the source text needs clarification.
    Do not use it for a concrete solution direction.
  allowed_synonym:
    - clarification
  forbidden_or_avoid_synonyms:
    - elaboration
    - decision
  source: "Internal model"
  category: "Statement type"

- term: elaboration
  definition: A concrete expression of what is needed to satisfy a requirement.
  example: "UC-A requires that the Netherlands processes BSN and date of birth in the ISM."
  explanation: |
    Statement_type.
    Use elaboration for design, process, or implementation consequences.
    Do not use it for purely semantic explanation.
  allowed_synonym:
    - concretization
  forbidden_or_avoid_synonyms:
    - interpretation
    - action
  source: "Internal model"
  category: "Statement type"

- term: decision
  definition: An explicit choice between alternatives.
  example: "For patient identification we use BSN and date of birth as the minimum set."
  explanation: |
    Statement_type.
    A decision should be used when a choice does not follow directly from the source.
  allowed_synonym:
    - choice
  forbidden_or_avoid_synonyms:
    - requirement
    - obvious consequence
  source: "Internal model"
  category: "Statement type"

- term: evidence
  definition: Demonstrable material supporting that something is true, implemented, or confirmed.
  example: "A test report showing that patient lookup works."
  explanation: |
    Statement_type.
    Examples of evidence:
    - test result
    - audit report
    - acceptance report
    - log extract
    - screenshot
  allowed_synonym:
    - substantiation
  forbidden_or_avoid_synonyms:
    - plan
    - intention
  source: "Internal model"
  category: "Statement type"

- term: question
  definition: An open point for which no established answer exists yet.
  example: "What counts as demographic data within MyHealth@EU?"
  explanation: |
    Statement_type.
    A question can later lead to an interpretation, decision, or requirement.
  allowed_synonym:
    - open issue
  forbidden_or_avoid_synonyms:
    - risk
    - issue
  source: "Internal model"
  category: "Statement type"

- term: risk
  definition: An uncertainty with possible negative impact.
  example: "Uncertainty about national identification requirements can lead to incorrect implementation."
  explanation: |
    Statement_type.
    Do not confuse it with a question.
    A risk implies possible harm or delay.
  allowed_synonym:
    - threat
  forbidden_or_avoid_synonyms:
    - question
    - action
  source: "Internal model"
  category: "Statement type"
