- term: text_original
  definition: The original text of a statement in the source language.
  example: "The patient must be uniquely and securely identified at national level."
  explanation: |
    Attribute.
    Use this field for the original wording from the source.
  allowed_synonym:
    - source text
  forbidden_or_avoid_synonyms:
    - translation
    - interpretation
  source: "Internal model"
  category: "Attribute"

- term: text_nl
  definition: The Dutch wording or translation of the source text.
  example: "De patient moet uniek en veilig geidentificeerd worden op nationaal niveau."
  explanation: |
    Attribute.
    This remains part of the same statement as long as it is only a translation.
    As soon as the text materially differs or adds interpretation, it becomes a separate statement.
  allowed_synonym:
    - Dutch text
    - translated text
  forbidden_or_avoid_synonyms:
    - interpretation
    - elaboration
  source: "Internal model"
  category: "Attribute"

- term: title
  definition: Short summary title of a statement.
  example: "Unique and secure patient identification at national level"
  explanation: |
    Attribute.
    The title is short and scannable.
    The full content belongs in the text fields.
  allowed_synonym:
    - heading
  forbidden_or_avoid_synonyms:
    - full requirement
    - heading with all details
  source: "Internal model"
  category: "Attribute"

- term: moscow
  definition: Prioritization of a requirement according to the MoSCoW method.
  example: "Must"
  explanation: |
    Attribute.
    Allowed values:
    - Must
    - Should
    - Could
    - Won't
  allowed_synonym:
    - priority
  forbidden_or_avoid_synonyms:
    - level
    - urgency
  source: "Programme of Requirements PS-A"
  category: "Attribute"

- term: relevance
  definition: The parties for whom a statement is relevant.
  example:
    vws: true
    cibg: true
    vzvz: false
    nictiz: false
  explanation: |
    Attribute.
    Initial field set:
    - vws
    - cibg
    - vzvz
    - nictiz
    - other_eu_member_state
    - other
  allowed_synonym:
    - applicability_per_party
  forbidden_or_avoid_synonyms:
    - owner
    - accountable
  source: "Programme of Requirements PS-A"
  category: "Attribute"

- term: increment
  definition: Delivery step or release moment to which a statement is linked.
  example: "2"
  explanation: |
    Attribute.
    Used in programme steering.
    Do not confuse it with plateau.
  allowed_synonym:
    - delivery increment
  forbidden_or_avoid_synonyms:
    - plateau
    - sprint
  source: "Programme of Requirements PS-A"
  category: "Steering"

- term: use_case
  definition: A cross-border care scenario within MyHealth@EU.
  example: "Patient Summary"
  explanation: |
    Attribute or relational anchor, depending on the final model.
    Examples:
    - Patient Summary
    - ePrescription
    - eDispensation
  allowed_synonym:
    - use case
    - scenario
  forbidden_or_avoid_synonyms:
    - theme
    - component
  source: "eHDSI Requirements Catalogue"
  category: "Steering"
