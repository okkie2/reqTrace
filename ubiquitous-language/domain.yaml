- term: plateau
  definition: Dutch phasing in which a set of capabilities or sources is realized.
  example: "Plateau 2"
  explanation: |
    Used to indicate scope and realization order in the Dutch context.
  allowed_synonym:
    - phase
  forbidden_or_avoid_synonyms:
    - release
  source: "NCPeH project context"
  category: "Steering"

- term: myhealth_eu
  definition: European infrastructure for primary cross-border exchange of health data.
  example: "Patient Summary is exchanged through MyHealth@EU."
  explanation: |
    MyHealth@EU is the operational European facility for cross-border health data exchange.
  allowed_synonym:
    - "MyHealth@EU"
  forbidden_or_avoid_synonyms:
    - EHDS
    - central European database
  source: "NCPeH project contract and eHDSI Requirements Catalogue"
  category: "Domain"

- term: ncpeh
  definition: National Contact Point for cross-border exchange of health data.
  example: "CIBG operates NCPeH-NL."
  explanation: |
    NCPeH, National Contact Point eHealth.
    Do not confuse it with NCP-A or NCP-B, which are roles in a use case.
  allowed_synonym:
    - NCPeH
  forbidden_or_avoid_synonyms:
    - node in a generic sense
  source: "NCPeH project contract"
  category: "Domain"

- term: ncp_a
  definition: The NCPeH of the country of affiliation.
  example: "NCP-A delivers the Patient Summary to NCP-B."
  explanation: |
    NCP-A, National Contact Point of Country of Affiliation.
    A role within the use case, not a fixed organization.
  allowed_synonym:
    - country of affiliation
  forbidden_or_avoid_synonyms:
    - the Netherlands by definition
  source: "eHDSI Requirements Catalogue"
  category: "Domain"

- term: ncp_b
  definition: The NCPeH of the country of treatment.
  example: "NCP-B requests the Patient Summary from NCP-A."
  explanation: |
    NCP-B, National Contact Point of Country of Treatment.
    A role within the use case, not a fixed organization.
  allowed_synonym:
    - country of treatment
  forbidden_or_avoid_synonyms:
    - the Netherlands by definition
  source: "eHDSI Requirements Catalogue"
  category: "Domain"

- term: patient_summary
  definition: Patient summary for cross-border care.
  example: "Patient Summary is a use case within MyHealth@EU."
  explanation: |
    PS, Patient Summary.
    Contains essential health information for safe care.
  allowed_synonym:
    - PS
    - Patient Summary
  forbidden_or_avoid_synonyms:
    - full record
    - electronic patient record
  source: "eHDSI Requirements Catalogue"
  category: "Domain"

- term: eprescription
  definition: Electronic prescription made available across borders.
  example: "A Dutch citizen can collect an ePrescription in another EU country."
  explanation: |
    eP, ePrescription.
  allowed_synonym:
    - eP
    - ePrescription
  forbidden_or_avoid_synonyms:
    - medication agreement in a generic sense
  source: "NCPeH project contract"
  category: "Domain"

- term: edispensation
  definition: Electronic feedback about the dispensing of medication.
  example: "eDispensation can be sent back to the prescribing country."
  explanation: |
    eD, eDispensation.
  allowed_synonym:
    - eD
    - eDispensation
  forbidden_or_avoid_synonyms:
    - prescription
  source: "NCPeH project contract"
  category: "Domain"

- term: ism
  definition: Country-specific set of identifying data used to find a patient.
  example: "The Netherlands requests BSN and date of birth in the ISM."
  explanation: |
    ISM, International Search Mask.
    Used in patient identification across borders.
  allowed_synonym:
    - International Search Mask
  forbidden_or_avoid_synonyms:
    - search screen
    - patient index
  source: "Programme of Requirements eP/eD"
  category: "Domain"

- term: lsp
  definition: Dutch node for health data exchange.
  example: "NCPeH-NL is connected to the LSP."
  explanation: |
    LSP, Landelijk Schakelpunt.
    Operated by VZVZ, Vereniging van Zorgaanbieders voor Zorgcommunicatie.
  allowed_synonym:
    - Landelijk Schakelpunt
  forbidden_or_avoid_synonyms:
    - NCPeH
    - AORTA as a whole
  source: "Chain partner introduction"
  category: "Domain"

- term: mvc
  definition: European reference set of value lists for semantic interoperability.
  example: "Nictiz provides Dutch translations of value sets from the MVC."
  explanation: |
    MVC, Master Value Sets Catalogue.
  allowed_synonym:
    - Master Value Sets Catalogue
  forbidden_or_avoid_synonyms:
    - MTC
    - terminology server in a generic sense
  source: "Chain partner introduction and CTS specification"
  category: "Domain"

- term: mtc
  definition: European catalogue for translation and transcoding of terminology.
  example: "The MTC supports semantic exchange between countries."
  explanation: |
    MTC, Master Translation/Transcoding Catalogue.
  allowed_synonym:
    - Master Translation/Transcoding Catalogue
  forbidden_or_avoid_synonyms:
    - MVC
  source: "Central Terminology Services Specifications"
  category: "Domain"

- term: semantic_interoperability
  definition: The receiving party understands the meaning of exchanged data in the same way as the sending party.
  example: "A medication code must have the same clinical meaning in both countries."
  explanation: |
    Not only structure but also meaning must align.
  allowed_synonym:
    - semantic interoperability
  forbidden_or_avoid_synonyms:
    - technical interoperability
    - translation only
  source: "eHDSI Requirements Catalogue and CTS specification"
  category: "Domain"
