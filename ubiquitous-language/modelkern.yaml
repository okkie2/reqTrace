- term: statement
  definition: A traceable assertion in the model.
  example: "NL requires BSN and date of birth in the International Search Mask (ISM)."
  explanation: |
    Basic unit of the statement network.
    A statement can have different types, such as requirement, interpretation, or decision.
  allowed_synonym:
    - assertion
  forbidden_or_avoid_synonyms:
    - requirement
    - item
    - rule
  source: "Internal model"
  category: "Model core"

- term: statement_type
  definition: The kind of statement.
  example: "requirement"
  explanation: |
    Attribute.
    Allowed values:
    - requirement
    - interpretation
    - elaboration
    - decision
    - evidence
    - question
    - risk
  allowed_synonym:
    - type
  forbidden_or_avoid_synonyms:
    - kind of requirement
  source: "Internal model"
  category: "Model core"

- term: id
  definition: Internal, stable, and meaningless unique identifier of a statement.
  example: "000123"
  explanation: |
    Attribute.
    Always store as a string to preserve leading zeros.
    The id must not carry meaning about source, level, or theme.
  allowed_synonym:
    - internal id
  forbidden_or_avoid_synonyms:
    - code
    - source_code
    - meaningful key
  source: "Internal model"
  category: "Model core"

- term: level
  definition: The abstraction layer on which a statement exists.
  example: 2
  explanation: |
    Attribute.
    Allowed values in the first version:
    - 0
    - 1
    - 2
    - 3
    - 4
    Level helps with views and filtering.
    Parents carry the real structure.
  allowed_synonym:
    - abstraction level
  forbidden_or_avoid_synonyms:
    - priority
    - order
  source: "Internal model"
  category: "Model core"

- term: order
  definition: The order of a statement among sibling statements within the same parent context.
  example: 10
  explanation: |
    Attribute.
    Use order for display ordering.
    Do not use it to capture substantive dependency.
  allowed_synonym:
    - sorting
    - sort_key
  forbidden_or_avoid_synonyms:
    - follows_after
    - level
  source: "Internal model"
  category: "Model core"
