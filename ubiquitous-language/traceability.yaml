- term: source_code
  definition: The external code under which a statement is known in a source.
  example: "FR-eu02.01.1.a"
  explanation: |
    Attribute.
    A statement may later have multiple source codes, but in the first version one source code is sufficient.
  allowed_synonym:
    - external code
  forbidden_or_avoid_synonyms:
    - id
    - internal code
  source: "Programme of Requirements eP/eD"
  category: "Traceability"

- term: source
  definition: The authoritative document or system from which a statement directly originates.
  example: "eHDSI Requirements Catalogue v9.0.0 OR"
  explanation: |
    Attribute.
    Source refers to the document, not to the interpretation or elaboration.
  allowed_synonym:
    - source_document
  forbidden_or_avoid_synonyms:
    - origin in a general sense
  source: "Programme of Requirements PS-A and internal model"
  category: "Traceability"

- term: parent
  definition: A higher-level statement under which another statement is attached.
  example: "BR-eu02 is the parent of BR-eu02.1"
  explanation: |
    A statement can have multiple parents.
    Parents define hierarchical placement, not all relations.
  allowed_synonym:
    - higher-level statement
  forbidden_or_avoid_synonyms:
    - owner
    - source
  source: "Internal model"
  category: "Traceability"

- term: parents
  definition: The list of higher-level statements of a statement.
  example:
    - "000001"
    - "000045"
  explanation: |
    Attribute.
    A statement may have zero, one, or multiple parents.
    No cycles may be created.
  allowed_synonym:
    - parent_ids
  forbidden_or_avoid_synonyms:
    - path
    - breadcrumb
  source: "Internal model"
  category: "Traceability"

- term: relation
  definition: An explicit connection between two statements that is not purely hierarchical.
  example: "An elaboration is detail_van a requirement."
  explanation: |
    Relations make traceability explicit.
    Initially allowed relation types:
    - verplicht_wegens
    - vertaling_van
    - detail_van
    - uitwerking_van
  allowed_synonym:
    - link
  forbidden_or_avoid_synonyms:
    - parent
    - reference without meaning
  source: "Internal model"
  category: "Traceability"
