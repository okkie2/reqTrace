- term: source_code
  term_localized:
    en: source code
    nl: broncode
  definition:
    en: The external code under which a statement is known in a source.
    nl: De externe code waaronder een statement in een bron bekend staat.
  example:
    en: "FR-eu02.01.1.a"
    nl: "FR-eu02.01.1.a"
  explanation:
    en: |
      Attribute.
      A statement may later have multiple source codes, but in the first version one source code is sufficient.
    nl: |
      Attribuut.
      Een statement kan later meerdere broncodes hebben, maar in de eerste versie is één broncode voldoende.
  allowed_synonym:
    en:
      - external code
    nl:
      - externe code
  forbidden_or_avoid_synonyms:
    en:
      - id
      - internal code
    nl:
      - id
      - interne code
  source:
    en: Programme of Requirements eP/eD
    nl: Programma van Eisen eP/eD
  category:
    en: Traceability
    nl: Traceability

- term: source
  term_localized:
    en: source
    nl: bron
  definition:
    en: The authoritative document or system from which a statement directly originates.
    nl: Het gezaghebbende document of systeem waar een statement direct op teruggaat.
  example:
    en: "eHDSI Requirements Catalogue v9.0.0 OR"
    nl: "eHDSI Requirements Catalogue v9.0.0 OR"
  explanation:
    en: |
      Attribute.
      Source refers to provenance: the document or system from which the content comes.
      It is not a programme lineage or governance identifier.
    nl: |
      Attribuut.
      Bron verwijst naar provenance: het document of systeem waar de inhoud vandaan komt.
      Dit is geen programmalijn of governance-identificatie.
  allowed_synonym:
    en:
      - source_document
    nl:
      - bron_document
  forbidden_or_avoid_synonyms:
    en:
      - origin in a general sense
    nl:
      - herkomst in algemene zin
  source:
    en: Programme of Requirements PS-A and internal model
    nl: Programma van Eisen PS-A en intern model
  category:
    en: Traceability
    nl: Traceability

- term: piezo_id
  term_localized:
    en: piezo id
    nl: piezo-id
  definition:
    en: The external PIEZO programme lineage or governance identifier to which a statement is aligned.
    nl: De externe PIEZO-programmalijn of governance-identificatie waaraan een stelling is gekoppeld.
  example:
    en: "PIEZO-EUBR-03.01"
    nl: "PIEZO-EUBR-03.01"
  explanation:
    en: |
      Attribute.
      `piezo_id` captures programme identity, alignment, and reporting lineage.
      It is not a source citation.
      Multiple statements may legitimately share the same `piezo_id`.
    nl: |
      Attribuut.
      `piezo_id` legt programma-identiteit, alignment en rapportagelijn vast.
      Het is geen bronverwijzing.
      Meerdere stellingen mogen legitiem dezelfde `piezo_id` delen.
  allowed_synonym:
    en:
      - programme lineage id
      - external governance id
    nl:
      - programmalijn-id
      - externe governance-id
  forbidden_or_avoid_synonyms:
    en:
      - source
      - source code
      - document reference
    nl:
      - bron
      - broncode
      - documentverwijzing
  source:
    en: Internal model
    nl: Intern model
  category:
    en: Traceability
    nl: Traceability

- term: parent
  term_localized:
    en: parent
    nl: parent
  definition:
    en: A higher-level statement under which another statement is attached.
    nl: Een bovenliggend statement waar een ander statement onder hangt.
  example:
    en: "BR-eu02 is the parent of BR-eu02.1"
    nl: "BR-eu02 is parent van BR-eu02.1"
  explanation:
    en: |
      A statement can have multiple parents.
      Parents define hierarchical placement, not all relations.
    nl: |
      Een statement kan meerdere parents hebben.
      Parents bepalen de hiërarchische ophanging, niet alle relaties.
  allowed_synonym:
    en:
      - higher-level statement
    nl:
      - bovenliggend statement
  forbidden_or_avoid_synonyms:
    en:
      - owner
      - source
    nl:
      - owner
      - bron
  source:
    en: Internal model
    nl: Intern model
  category:
    en: Traceability
    nl: Traceability

- term: parents
  term_localized:
    en: parents
    nl: parents
  definition:
    en: The list of higher-level statements of a statement.
    nl: De lijst met bovenliggende statements van een statement.
  example:
    en:
      - "000001"
      - "000045"
    nl:
      - "000001"
      - "000045"
  explanation:
    en: |
      Attribute.
      A statement may have zero, one, or multiple parents.
      No cycles may be created.
    nl: |
      Attribuut.
      Een statement mag nul, één of meerdere parents hebben.
      Er mogen geen cirkels ontstaan.
  allowed_synonym:
    en:
      - parent_ids
    nl:
      - parent_ids
  forbidden_or_avoid_synonyms:
    en:
      - path
      - breadcrumb
    nl:
      - pad
      - breadcrumb
  source:
    en: Internal model
    nl: Intern model
  category:
    en: Traceability
    nl: Traceability

- term: relation
  term_localized:
    en: relation
    nl: relatie
  definition:
    en: An explicit connection between two statements that is not purely hierarchical.
    nl: Een expliciete verbinding tussen twee statements die niet puur hiërarchisch is.
  example:
    en: "An elaboration is detail_van a requirement."
    nl: "Een uitwerking is detail_van een eis."
  explanation:
    en: |
      Relations make traceability explicit.
      Initially allowed relation types:
      - verplicht_wegens
      - vertaling_van
      - detail_van
      - uitwerking_van
    nl: |
      Relaties maken herleidbaarheid expliciet.
      Voorlopig toegestane relatietypen:
      - verplicht_wegens
      - vertaling_van
      - detail_van
      - uitwerking_van
  allowed_synonym:
    en:
      - link
    nl:
      - koppeling
  forbidden_or_avoid_synonyms:
    en:
      - parent
      - reference without meaning
    nl:
      - parent
      - verwijzing zonder betekenis
  source:
    en: Internal model
    nl: Intern model
  category:
    en: Traceability
    nl: Traceability
