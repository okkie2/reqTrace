- term: source
  term_localized:
    en: source
    nl: bron
  definition:
    en: The authoritative document or system from which a statement directly originates.
    nl: Het gezaghebbende document of systeem waar een statement direct op teruggaat.
  example:
    en: "eHDSI Requirements Catalogue v9.0.0 OR"
    nl: "eHDSI Requirements Catalogue v9.0.0 OR"
  explanation:
    en: |
      Attribute.
      Source refers to provenance: the document or system from which the content comes.
      A source is not the same thing as a statement.
      One source can give rise to multiple statements, including competing interpretations.
      It is not a programme lineage or governance identifier.
      In the current MVP this belongs in `sources[]` provenance metadata.
    nl: |
      Attribuut.
      Bron verwijst naar provenance: het document of systeem waar de inhoud vandaan komt.
      Een bron is niet hetzelfde als een stelling.
      Eén bron kan leiden tot meerdere stellingen, inclusief concurrerende interpretaties.
      Dit is geen programmalijn of governance-identificatie.
      In de huidige MVP hoort dit thuis in `sources[]` als provenance-metadata.
  allowed_synonym:
    en:
      - source_document
    nl:
      - bron_document
  forbidden_or_avoid_synonyms:
    en:
      - origin in a general sense
    nl:
      - herkomst in algemene zin
  source:
    en: Programme of Requirements PS-A and internal model
    nl: Programma van Eisen PS-A en intern model
  category:
    en: Traceability
    nl: Traceability

- term: source_relation
  term_localized:
    en: source relation
    nl: bronrelatie
  definition:
    en: The provenance relationship between a statement and a source entry.
    nl: De provenance-relatie tussen een stelling en een bronvermelding.
  example:
    en: copied_from_eu_requirement
    nl: copied_from_eu_requirement
  explanation:
    en: |
      Attribute.
      In the current MVP, allowed values are intentionally limited to:
      - `copied_from_eu_requirement`
      - `copied_from_national_requirement`
      - `derived_from_law`
      This keeps provenance semantics small and explicit.
    nl: |
      Attribuut.
      In de huidige MVP zijn de toegestane waarden bewust beperkt tot:
      - `copied_from_eu_requirement`
      - `copied_from_national_requirement`
      - `derived_from_law`
      Dit houdt provenance-semantiek klein en expliciet.
  allowed_synonym:
    en:
      - provenance relation
    nl:
      - provenance-relatie
  forbidden_or_avoid_synonyms:
    en:
      - source type
      - statement type
    nl:
      - brontype
      - stellingtype
  source:
    en: Internal model
    nl: Intern model
  category:
    en: Traceability
    nl: Traceability

- term: piezo_id
  term_localized:
    en: piezo id
    nl: piezo-id
  definition:
    en: The external PIEZO programme lineage or governance identifier to which a statement is aligned.
    nl: De externe PIEZO-programmalijn of governance-identificatie waaraan een stelling is gekoppeld.
  example:
    en: "PIEZO-EUBR-03.01"
    nl: "PIEZO-EUBR-03.01"
  explanation:
    en: |
      Attribute.
      `piezo_id` captures programme identity, alignment, and reporting lineage.
      It is not a source citation.
      It is also not a statement type.
      Multiple statements may legitimately share the same `piezo_id`.
    nl: |
      Attribuut.
      `piezo_id` legt programma-identiteit, alignment en rapportagelijn vast.
      Het is geen bronverwijzing.
      Het is ook geen stellingtype.
      Meerdere stellingen mogen legitiem dezelfde `piezo_id` delen.
  allowed_synonym:
    en:
      - programme lineage id
      - external governance id
    nl:
      - programmalijn-id
      - externe governance-id
  forbidden_or_avoid_synonyms:
    en:
      - source
      - document reference
    nl:
      - bron
      - documentverwijzing
  source:
    en: Internal model
    nl: Intern model
  category:
    en: Traceability
    nl: Traceability

- term: parent
  term_localized:
    en: parent
    nl: parent
  definition:
    en: A higher-level statement under which another statement is attached.
    nl: Een bovenliggend statement waar een ander statement onder hangt.
  example:
    en: "BR-eu02 is the parent of BR-eu02.1"
    nl: "BR-eu02 is parent van BR-eu02.1"
  explanation:
    en: |
      A statement can have multiple parents.
      Parents define hierarchical placement, not all relations.
    nl: |
      Een statement kan meerdere parents hebben.
      Parents bepalen de hiërarchische ophanging, niet alle relaties.
  allowed_synonym:
    en:
      - higher-level statement
    nl:
      - bovenliggend statement
  forbidden_or_avoid_synonyms:
    en:
      - owner
      - source
    nl:
      - owner
      - bron
  source:
    en: Internal model
    nl: Intern model
  category:
    en: Traceability
    nl: Traceability

- term: parents
  term_localized:
    en: parents
    nl: parents
  definition:
    en: The list of higher-level statements of a statement.
    nl: De lijst met bovenliggende statements van een statement.
  example:
    en:
      - "000001"
      - "000045"
    nl:
      - "000001"
      - "000045"
  explanation:
    en: |
      Attribute.
      A statement may have zero, one, or multiple parents.
      No cycles may be created.
    nl: |
      Attribuut.
      Een statement mag nul, één of meerdere parents hebben.
      Er mogen geen cirkels ontstaan.
  allowed_synonym:
    en:
      - parent_ids
    nl:
      - parent_ids
  forbidden_or_avoid_synonyms:
    en:
      - path
      - breadcrumb
    nl:
      - pad
      - breadcrumb
  source:
    en: Internal model
    nl: Intern model
  category:
    en: Traceability
    nl: Traceability

- term: relation
  term_localized:
    en: relation
    nl: relatie
  definition:
    en: An explicit connection between two statements that is not purely hierarchical.
    nl: Een expliciete verbinding tussen twee statements die niet puur hiërarchisch is.
  example:
    en: "An elaboration is detail_van a requirement."
    nl: "Een uitwerking is detail_van een eis."
  explanation:
    en: |
      Relations make traceability explicit.
      Initially allowed relation types:
      - verplicht_wegens
      - vertaling_van
      - detail_van
      - uitwerking_van
    nl: |
      Relaties maken herleidbaarheid expliciet.
      Voorlopig toegestane relatietypen:
      - verplicht_wegens
      - vertaling_van
      - detail_van
      - uitwerking_van
  allowed_synonym:
    en:
      - link
    nl:
      - koppeling
  forbidden_or_avoid_synonyms:
    en:
      - parent
      - reference without meaning
    nl:
      - parent
      - verwijzing zonder betekenis
  source:
    en: Internal model
    nl: Intern model
  category:
    en: Traceability
    nl: Traceability
