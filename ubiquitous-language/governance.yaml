- term: owner
  definition: The person or party that maintains a statement substantively in the system.
  example: "CIBG is the owner of this Dutch elaboration."
  explanation: |
    Attribute.
    Owner is not automatically the source holder or the formally accountable party.
  allowed_synonym:
    - statement steward
  forbidden_or_avoid_synonyms:
    - source
    - accountable
  source: "Internal model"
  category: "Governance"

- term: dod
  definition: Criteria used to determine that an elaboration or delivery is complete.
  example: "Definition of Done contains test and acceptance criteria."
  explanation: |
    DoD, Definition of Done.
    Not every statement needs a DoD.
  allowed_synonym:
    - Definition of Done
  forbidden_or_avoid_synonyms:
    - evidence
    - requirement
  source: "Project practice"
  category: "Governance"
